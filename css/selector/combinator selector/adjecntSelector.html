<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        /* Only the paragraph inside .card should become green.

The outside paragraph should not change. */

.card > h2+p{
    color: green;
}

    </style>
</head>

<body>

    <div class="card">

        <h2>Title</h2>
        <p>Description</p>

    </div>

    <p>Outside Paragraph</p>


</body>

</html>
